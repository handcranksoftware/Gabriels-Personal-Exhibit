<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gabriel's Music!</title>

<meta property="og:title" content="Gabriel's Music!">
<meta property="og:description" content="Gabriel's Music!">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5865F2">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Gabriel's Music!">
<meta name="twitter:description" content="Gabriel's Music!">

<script src="https://cdn.jsdelivr.net/npm/html-midi-player@1.5.0/build/bundle.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 14px; padding: 16px; background: #fff; color: #000; }
  h1 { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
  #status { margin-bottom: 8px; color: #555; }
  #song-list { list-style: none; margin-bottom: 16px; }
  #song-list li { padding: 4px 0; cursor: pointer; border-bottom: 1px solid #ddd; }
  #song-list li:hover { background: #f0f0f0; }
  #song-list li.active { background: #e8e8e8; font-weight: bold; }
  #song-list li .filename { display: block; }
  #song-list li .meta-title { display: block; color: #555; font-size: 12px; }
  midi-player {
    display: block;
    width: 100%;
    margin-top: 10px;
    border-top: 2px solid #000;
    padding-top: 10px;
  }
  #now-playing { font-weight: bold; margin-top: 10px; border-top: 2px solid #000; padding-top: 10px; margin-bottom: 6px; }
</style>
</head>
<body>

<h1>Gabriel's Music!</h1>
<div id="status">Loading…</div>
<ul id="song-list"></ul>
<div id="now-playing" style="display:none">—</div>
<midi-player id="player" sound-font="https://storage.googleapis.com/magentadata/js/soundfonts/sgm_plus" style="display:none"></midi-player>

<script>
const $ = id => document.getElementById(id);
const status = msg => { $('status').textContent = msg; };

function readMidiTitle(buffer) {
  const b = new Uint8Array(buffer);
  let i = 0;
  const read = () => b[i++];
  const readU32 = () => (read()<<24)|(read()<<16)|(read()<<8)|read();
  const readVLQ = () => { let v=0,c; do { c=read(); v=(v<<7)|(c&0x7f); } while(c&0x80); return v; };
  try {
    if (String.fromCharCode(b[0],b[1],b[2],b[3]) !== 'MThd') return null;
    i = 4; readU32();
    const format = (b[i]<<8)|b[i+1]; i+=2;
    const ntracks = (b[i]<<8)|b[i+1]; i+=2;
    i += 2;
    for (let t = 0; t < Math.min(ntracks, 3); t++) {
      if (i+8 > b.length) break;
      if (String.fromCharCode(b[i],b[i+1],b[i+2],b[i+3]) !== 'MTrk') break;
      i += 4;
      const tlen = readU32();
      const tend = i + tlen;
      while (i < tend - 1) {
        readVLQ();
        const evt = read();
        if (evt === 0xff) {
          const mtype = read();
          const mlen = readVLQ();
          if (mtype === 0x03) {
            return new TextDecoder('utf-8', {fatal:false}).decode(b.slice(i, i+mlen)).trim();
          }
          i += mlen;
        } else if (evt === 0xf0 || evt === 0xf7) {
          i += readVLQ();
        } else {
          const ch = evt & 0xf0;
          if (ch === 0xc0 || ch === 0xd0) i += 1;
          else if (evt < 0x80) i += 1;
          else i += 2;
        }
      }
      i = tend;
    }
  } catch(_) {}
  return null;
}

async function discoverFiles() {
  const base = location.href.replace(/\/?([\?#].*)?$/, '/');
  try {
    const r = await fetch(base + 'manifest.json');
    if (r.ok) {
      const mf = await r.json();
      const midis = (mf.midis || []).map(e => base + (typeof e === 'string' ? e : e.file));
      const sf2s  = (mf.sf2s  || []).map(e => base + (typeof e === 'string' ? e : e.file));
      if (midis.length || sf2s.length) return { midis, sf2s };
    }
  } catch(_) {}
  try {
    const r = await fetch(base);
    const html = await r.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
    return {
      midis: hrefs.filter(h => /\.(mid|midi)$/i.test(h)).map(h => new URL(h, base).href),
      sf2s:  hrefs.filter(h => /\.sf2$/i.test(h)).map(h => new URL(h, base).href),
    };
  } catch(_) {}
  return { midis: [], sf2s: [] };
}

let songs = [];
let currentSongIdx = -1;
const player = $('player');

function playSong(idx) {
  const song = songs[idx];
  if (!song) return;

  document.querySelectorAll('#song-list li').forEach((li, i) =>
    li.classList.toggle('active', i === idx));
  currentSongIdx = idx;

  $('now-playing').style.display = 'block';
  $('now-playing').textContent = `Now: ${song.filename}${song.title ? ' — ' + song.title : ''}`;
  player.style.display = 'block';

  // Set src to a data URL of the midi buffer
  const blob = new Blob([song.buf], { type: 'audio/midi' });
  const url = URL.createObjectURL(blob);
  player.src = url;
  player.start();
}

// Auto-advance when song ends
player.addEventListener('stop', () => {
  if (currentSongIdx >= 0) {
    const next = (currentSongIdx + 1) % songs.length;
    playSong(next);
  }
});

(async () => {
  const { midis, sf2s } = await discoverFiles();

  if (midis.length === 0) {
    status('No MIDI files found.');
    return;
  }

  status(`Loading ${midis.length} track(s)…`);

  const raw = await Promise.all(midis.map(async url => {
    const filename = decodeURIComponent(url.split('/').pop());
    try {
      const r = await fetch(url);
      const buf = await r.arrayBuffer();
      const title = readMidiTitle(buf);
      return { url, filename, title, buf };
    } catch(_) {
      return null;
    }
  }));

  songs = raw.filter(Boolean).sort((a, b) => a.filename.localeCompare(b.filename));

  const list = $('song-list');
  songs.forEach((song, idx) => {
    const li = document.createElement('li');
    const fn = document.createElement('span');
    fn.className = 'filename';
    fn.textContent = song.filename;
    li.appendChild(fn);
    if (song.title) {
      const mt = document.createElement('span');
      mt.className = 'meta-title';
      mt.textContent = song.title;
      li.appendChild(mt);
    }
    li.addEventListener('click', () => playSong(idx));
    list.appendChild(li);
  });

  status(`${songs.length} track(s) ready. Click a track to play.`);
})();
</script>
</body>
</html>
