<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gabriel's Music!</title>

<!-- Discord / OG embed -->
<meta property="og:title" content="Gabriel's Music!">
<meta property="og:description" content="Gabriel's Music!">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5865F2">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Gabriel's Music!">
<meta name="twitter:description" content="Gabriel's Music!">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 14px; padding: 16px; background: #fff; color: #000; }
  h1 { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
  #status { margin-bottom: 8px; color: #555; }
  #sf2-section { margin-bottom: 12px; }
  #sf2-section label { margin-right: 6px; }
  #song-list { list-style: none; margin-bottom: 16px; }
  #song-list li { padding: 4px 0; cursor: pointer; border-bottom: 1px solid #ddd; }
  #song-list li:hover { background: #f0f0f0; }
  #song-list li.active { background: #e8e8e8; font-weight: bold; }
  #song-list li .filename { display: block; }
  #song-list li .meta-title { display: block; color: #555; font-size: 12px; }
  #player { border-top: 2px solid #000; padding-top: 10px; }
  #now-playing { margin-bottom: 6px; font-weight: bold; }
  #controls { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  #controls button { font-family: monospace; cursor: pointer; }
  #seek { width: 100%; cursor: pointer; }
  #time-display { font-size: 12px; color: #555; }
</style>
</head>
<body>

<h1>Gabriel's Music!</h1>
<div id="status">Loading assets…</div>
<div id="sf2-section" style="display:none">
  <label for="sf2-select">Soundfont:</label>
  <select id="sf2-select"></select>
</div>
<ul id="song-list"></ul>

<div id="player" style="display:none">
  <div id="now-playing">—</div>
  <div id="controls">
    <button id="btn-play">▶ Play</button>
    <button id="btn-stop">■ Stop</button>
  </div>
  <input type="range" id="seek" min="0" max="1000" value="0" step="1">
  <div id="time-display">0:00 / 0:00</div>
</div>

<script type="module">
// ── Helpers ───────────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const status = msg => { $('status').textContent = msg; };
const fmt = s => { s = Math.max(0, Math.floor(s)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };

// ── Read MIDI text meta (type 3 = track/sequence name) ───────────────────────

function readMidiTitle(buffer) {
  const b = new Uint8Array(buffer);
  let i = 0;
  const read = () => b[i++];
  const readU32 = () => (read()<<24)|(read()<<16)|(read()<<8)|read();
  const readVLQ = () => { let v=0,c; do { c=read(); v=(v<<7)|(c&0x7f); } while(c&0x80); return v; };
  try {
    if (String.fromCharCode(b[0],b[1],b[2],b[3]) !== 'MThd') return null;
    i = 4; readU32(); // chunk length
    const format = (b[i]<<8)|b[i+1]; i+=2;
    const ntracks = (b[i]<<8)|b[i+1]; i+=2;
    i += 2; // division
    for (let t = 0; t < Math.min(ntracks, 3); t++) {
      if (i+8 > b.length) break;
      if (String.fromCharCode(b[i],b[i+1],b[i+2],b[i+3]) !== 'MTrk') break;
      i += 4;
      const tlen = readU32();
      const tend = i + tlen;
      while (i < tend - 1) {
        readVLQ();
        const evt = read();
        if (evt === 0xff) {
          const mtype = read();
          const mlen = readVLQ();
          if (mtype === 0x03) {
            return new TextDecoder('utf-8', {fatal:false}).decode(b.slice(i, i+mlen)).trim();
          }
          i += mlen;
        } else if (evt === 0xf0 || evt === 0xf7) {
          i += readVLQ();
        } else {
          const ch = evt & 0xf0;
          if (ch === 0xc0 || ch === 0xd0) i += 1;
          else if (evt < 0x80) { /* running status, skip 1 */ i += 1; }
          else i += 2;
        }
      }
      i = tend;
    }
  } catch(_) {}
  return null;
}

// ── Load SpessaSynth v4 ───────────────────────────────────────────────────────
// v4 API: WorkletSynthesizer + Sequencer (replaces Synthetizer/MIDI/MidiPlayer)
// The worklet processor must be registered before creating WorkletSynthesizer.

const SPESSA_VERSION = '4.3.8';
const JSDELIVR_BASE  = `https://cdn.jsdelivr.net/npm/spessasynth_lib@${SPESSA_VERSION}`;
const PROCESSOR_URL  = `${JSDELIVR_BASE}/dist/spessasynth_processor.min.js`;
const ESM_URL        = `https://esm.run/spessasynth_lib@${SPESSA_VERSION}`;

let WorkletSynthesizer, Sequencer;

async function loadSpessa() {
  status('Loading MIDI engine…');
  try {
    const mod = await import(ESM_URL);
    WorkletSynthesizer = mod.WorkletSynthesizer;
    Sequencer          = mod.Sequencer;
    if (!WorkletSynthesizer || !Sequencer) throw new Error('Exports not found');
    return true;
  } catch(e) {
    status('Failed to load MIDI engine: ' + e.message);
    return false;
  }
}

// ── Discover files ────────────────────────────────────────────────────────────

async function discoverFiles() {
  const base = location.href.replace(/\/?(\?.*)?$/, '/');

  // 1. Try manifest.json (works on GitHub Pages where dir listing is off)
  try {
    const r = await fetch(base + 'manifest.json');
    if (r.ok) {
      const mf = await r.json();
      const midis = (mf.midis || []).map(e => base + (typeof e === 'string' ? e : e.file));
      const sf2s  = (mf.sf2s  || []).map(e => base + (typeof e === 'string' ? e : e.file));
      if (midis.length || sf2s.length) return { midis, sf2s };
    }
  } catch(_) {}

  // 2. Try HTML directory listing
  try {
    const r = await fetch(base);
    const html = await r.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
    return {
      midis: hrefs.filter(h => /\.(mid|midi)$/i.test(h)).map(h => new URL(h, base).href),
      sf2s:  hrefs.filter(h => /\.sf2$/i.test(h)).map(h => new URL(h, base).href),
    };
  } catch(_) {}

  return { midis: [], sf2s: [] };
}

// ── State ─────────────────────────────────────────────────────────────────────

let ctx, synth, sequencer;
let workletReady = false;
let songs = [];
let currentSF2Buf = null;
let currentSongIdx = -1;
let seeking = false;

// ── SF2 loading ───────────────────────────────────────────────────────────────

async function loadSF2(url) {
  status('Loading soundfont…');
  const r = await fetch(url);
  if (!r.ok) throw new Error('Failed to fetch SF2: ' + url);
  currentSF2Buf = await r.arrayBuffer();
  status('Soundfont loaded.');
}

// ── Play a song ───────────────────────────────────────────────────────────────

async function playSong(idx) {
  const song = songs[idx];
  if (!song) return;

  document.querySelectorAll('#song-list li').forEach((li, i) =>
    li.classList.toggle('active', i === idx));
  currentSongIdx = idx;

  $('player').style.display = 'block';
  $('now-playing').textContent =
    `Now: ${song.filename}${song.title ? ' — ' + song.title : ''}`;

  // Create / resume AudioContext (must happen inside user gesture)
  if (!ctx) {
    ctx = new AudioContext({ sampleRate: 44100 });
    workletReady = false;
  }
  if (ctx.state === 'suspended') await ctx.resume();

  // Stop previous playback
  if (sequencer) { try { sequencer.pause(); } catch(_) {} }
  if (synth)     { try { synth.stopAll(true); } catch(_) {} }

  // Use already-fetched buffer; fall back to re-fetching if missing
  let midiBuf = song.buf;
  if (!midiBuf) {
    status('Fetching MIDI…');
    const mr = await fetch(song.url);
    if (!mr.ok) { status('Could not load MIDI: ' + song.filename); return; }
    midiBuf = await mr.arrayBuffer();
    song.buf = midiBuf;
  }

  status('Starting synth…');

  // WorkletSynthesizer needs the audio worklet module loaded first (only once per context)
  if (!workletReady) {
    await ctx.audioWorklet.addModule(PROCESSOR_URL);
    workletReady = true;
  }

  synth = new WorkletSynthesizer(ctx, PROCESSOR_URL, { reverbEnabled: false });
  await synth.isReady;

  // Add the soundfont
  await synth.soundfontManager.addSoundFont(currentSF2Buf.slice(0), 'default');

  // Create sequencer and load song
  sequencer = new Sequencer([{ binary: midiBuf }], synth);

  sequencer.play();
  $('btn-play').textContent = '⏸ Pause';
  status('Playing.');

  // Auto-advance when song ends
  sequencer.addOnSongEndedEvent(() => {
    const next = (currentSongIdx + 1) % songs.length;
    playSong(next);
  }, 'auto-advance');

  updateSeekLoop();
}

// ── Seek / time display ───────────────────────────────────────────────────────

function updateSeekLoop() {
  const seekEl = $('seek');
  const timeEl = $('time-display');

  function tick() {
    if (!sequencer) return;
    const cur = sequencer.currentTime;        // seconds
    const dur = sequencer.duration;           // seconds

    if (dur > 0 && !seeking) {
      seekEl.value = Math.round((cur / dur) * 1000);
    }
    timeEl.textContent = `${fmt(cur)} / ${fmt(dur)}`;

    if (!sequencer.paused) {
      requestAnimationFrame(tick);
    }
  }
  requestAnimationFrame(tick);
}

// ── Controls ──────────────────────────────────────────────────────────────────

$('btn-play').addEventListener('click', () => {
  if (!sequencer) return;
  if (sequencer.paused) {
    sequencer.play();
    $('btn-play').textContent = '⏸ Pause';
    updateSeekLoop();
  } else {
    sequencer.pause();
    $('btn-play').textContent = '▶ Play';
  }
});

$('btn-stop').addEventListener('click', () => {
  if (!sequencer) return;
  sequencer.pause();
  sequencer.currentTime = 0;
  $('btn-play').textContent = '▶ Play';
  $('seek').value = 0;
});

$('seek').addEventListener('mousedown',  () => { seeking = true; });
$('seek').addEventListener('touchstart', () => { seeking = true; }, { passive: true });
$('seek').addEventListener('input', () => {
  if (!sequencer) return;
  const t = (parseInt($('seek').value) / 1000) * sequencer.duration;
  $('time-display').textContent = `${fmt(t)} / ${fmt(sequencer.duration)}`;
});
$('seek').addEventListener('change', () => {
  if (!sequencer) return;
  sequencer.currentTime = (parseInt($('seek').value) / 1000) * sequencer.duration;
  seeking = false;
  if (!sequencer.paused) updateSeekLoop();
});

// ── SF2 switcher ──────────────────────────────────────────────────────────────

$('sf2-select').addEventListener('change', async () => {
  await loadSF2($('sf2-select').value);
  if (currentSongIdx >= 0) playSong(currentSongIdx);
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────

(async () => {
  const ok = await loadSpessa();
  if (!ok) return;

  const { midis, sf2s } = await discoverFiles();

  if (sf2s.length === 0) {
    status('No .sf2 soundfont files found. Add one and reload.');
    return;
  }

  if (sf2s.length > 1) {
    const sel = $('sf2-select');
    sf2s.forEach(url => {
      const opt = document.createElement('option');
      opt.value = url;
      opt.textContent = url.split('/').pop();
      sel.appendChild(opt);
    });
    $('sf2-section').style.display = 'block';
  }

  await loadSF2(sf2s[0]);

  if (midis.length === 0) {
    status('No MIDI files found. Add .mid files and reload.');
    return;
  }

  status(`Reading ${midis.length} MIDI file(s)…`);

  await Promise.all(midis.map(async (url, idx) => {
    const filename = decodeURIComponent(url.split('/').pop());
    let title = null;
    try {
      const r = await fetch(url);
      const buf = await r.arrayBuffer();
      title = readMidiTitle(buf);
      songs[idx] = { url, filename, title, buf };
    } catch(_) {
      songs[idx] = { url, filename, title: null, buf: null };
    }
  }));

  songs = songs.filter(Boolean);
  songs.sort((a, b) => a.filename.localeCompare(b.filename));

  const list = $('song-list');
  songs.forEach((song, idx) => {
    const li = document.createElement('li');
    const fn = document.createElement('span');
    fn.className = 'filename';
    fn.textContent = song.filename;
    li.appendChild(fn);
    if (song.title) {
      const mt = document.createElement('span');
      mt.className = 'meta-title';
      mt.textContent = song.title;
      li.appendChild(mt);
    }
    li.addEventListener('click', () => playSong(idx));
    list.appendChild(li);
  });

  status(`${songs.length} track(s) ready. Click a track to play.`);
})();
</script>
</body>
</html>
