<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gabriel's Music!</title>

<!-- Discord / OG embed -->
<meta property="og:title" content="Gabriel's Music!">
<meta property="og:description" content="Gabriel's Music!">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5865F2">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Gabriel's Music!">
<meta name="twitter:description" content="Gabriel's Music!">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 14px; padding: 16px; background: #fff; color: #000; }
  h1 { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
  #status { margin-bottom: 8px; color: #555; }
  #sf2-section { margin-bottom: 12px; }
  #sf2-section label { margin-right: 6px; }
  #song-list { list-style: none; margin-bottom: 16px; }
  #song-list li { padding: 4px 0; cursor: pointer; border-bottom: 1px solid #ddd; }
  #song-list li:hover { background: #f0f0f0; }
  #song-list li.active { background: #e8e8e8; font-weight: bold; }
  #song-list li .filename { display: block; }
  #song-list li .meta-title { display: block; color: #555; font-size: 12px; }
  #player { border-top: 2px solid #000; padding-top: 10px; }
  #now-playing { margin-bottom: 6px; font-weight: bold; }
  #controls { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  #controls button { font-family: monospace; cursor: pointer; }
  #seek { width: 100%; cursor: pointer; }
  #time-display { font-size: 12px; color: #555; }
</style>
</head>
<body>

<h1>Gabriel's Music!</h1>
<div id="status">Loading assets…</div>
<div id="sf2-section" style="display:none">
  <label for="sf2-select">Soundfont:</label>
  <select id="sf2-select"></select>
</div>
<ul id="song-list"></ul>

<div id="player" style="display:none">
  <div id="now-playing">—</div>
  <div id="controls">
    <button id="btn-play">▶ Play</button>
    <button id="btn-stop">■ Stop</button>
  </div>
  <input type="range" id="seek" min="0" max="1000" value="0" step="1">
  <div id="time-display">0:00 / 0:00</div>
</div>

<!--
  SpessaSynth is a pure JS MIDI + SF2 player.
  We load it from the official CDN release.
-->
<script type="module">
// ── Helpers ──────────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const status = msg => { $('status').textContent = msg; };
const fmt = s => { s = Math.floor(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };

// ── Discover assets via GitHub Pages directory listing ────────────────────────
// GitHub Pages serves an HTML directory index at the repo root.
// We fetch it and parse anchor hrefs for .mid/.midi/.sf2 files.
// Works for both user.github.io/repo/ and custom domains.

async function discoverFiles() {
  // The assets folder we look in — change this if you put files elsewhere
  const base = location.href.replace(/\/?$/, '/');
  let html = '';
  try {
    const r = await fetch(base);
    html = await r.text();
  } catch(e) {
    status('Could not fetch directory listing.');
    return { midis: [], sf2s: [] };
  }

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));

  const midis = hrefs.filter(h => /\.(mid|midi)$/i.test(h)).map(h => new URL(h, base).href);
  const sf2s  = hrefs.filter(h => /\.sf2$/i.test(h)).map(h => new URL(h, base).href);

  // Fallback: if GH Pages doesn't list dirs, try fetching a manifest.json
  if (midis.length === 0 && sf2s.length === 0) {
    try {
      const mfr = await fetch(base + 'manifest.json');
      if (mfr.ok) {
        const mf = await mfr.json();
        return {
          midis: (mf.midis||[]).map(f => base + f),
          sf2s:  (mf.sf2s ||[]).map(f => base + f),
        };
      }
    } catch(_) {}
  }

  return { midis, sf2s };
}

// ── Read MIDI text meta (type 3 = track name / sequence name) ────────────────

function readMidiTitle(buffer) {
  const b = new Uint8Array(buffer);
  let i = 0;
  const read = () => b[i++];
  const readU32 = () => (read()<<24)|(read()<<16)|(read()<<8)|read();
  const readVLQ = () => {
    let v = 0, c;
    do { c = read(); v = (v<<7)|(c&0x7f); } while (c&0x80);
    return v;
  };

  try {
    if (String.fromCharCode(b[0],b[1],b[2],b[3]) !== 'MThd') return null;
    i = 8; // skip MThd length+format+ntracks+division header fields we don't need right now
    readU32(); // length (always 6)
    const format = (b[i]<<8)|b[i+1]; i+=2;
    const ntracks = (b[i]<<8)|b[i+1]; i+=2;
    i += 2; // division

    // search first few tracks for sequence/track name event (meta 0x03)
    const tracksToSearch = Math.min(ntracks, 3);
    for (let t = 0; t < tracksToSearch; t++) {
      if (String.fromCharCode(b[i],b[i+1],b[i+2],b[i+3]) !== 'MTrk') break;
      i += 4;
      const tlen = readU32();
      const tend = i + tlen;
      while (i < tend) {
        readVLQ(); // delta time
        const evt = read();
        if (evt === 0xff) {
          const mtype = read();
          const mlen = readVLQ();
          if (mtype === 0x03) { // Sequence/Track Name
            const bytes = b.slice(i, i+mlen);
            return new TextDecoder('utf-8', {fatal:false}).decode(bytes).trim();
          }
          i += mlen;
        } else if (evt === 0xf0 || evt === 0xf7) {
          i += readVLQ();
        } else {
          // skip status + data bytes
          const ch = evt & 0xf0;
          if (ch === 0xc0 || ch === 0xd0) i += 1;
          else if (ch === 0xf0) { /* nothing */ }
          else i += 2;
        }
      }
      i = tend;
    }
  } catch(_) {}
  return null;
}

// ── Load SpessaSynth dynamically ──────────────────────────────────────────────
// SpessaSynth exposes MIDI_PLAYER and SYNTHETIZER via ESM

let Synthetizer, MIDI, MidiPlayer;

async function loadSpessa() {
  status('Loading MIDI engine…');
  try {
    // SpessaSynth ESM bundle on jsDelivr (stable release)
    const mod = await import('https://cdn.jsdelivr.net/npm/spessasynth_lib@3/src/spessasynth_lib/index.js');
    Synthetizer = mod.Synthetizer;
    MIDI = mod.MIDI;
    MidiPlayer = mod.MidiPlayer;
    return true;
  } catch(e) {
    // Try unpkg as fallback
    try {
      const mod2 = await import('https://unpkg.com/spessasynth_lib/src/spessasynth_lib/index.js');
      Synthetizer = mod2.Synthetizer;
      MIDI = mod2.MIDI;
      MidiPlayer = mod2.MidiPlayer;
      return true;
    } catch(e2) {
      status('Failed to load MIDI engine: ' + e2.message);
      return false;
    }
  }
}

// ── State ─────────────────────────────────────────────────────────────────────

let ctx, synth, player;
let songs = []; // {url, filename, title}
let sf2s  = []; // urls
let currentSF2Buf = null;
let currentSongIdx = -1;
let seeking = false;

// ── SF2 loading ───────────────────────────────────────────────────────────────

async function loadSF2(url) {
  status('Loading soundfont…');
  const r = await fetch(url);
  if (!r.ok) throw new Error('Failed to fetch SF2: ' + url);
  currentSF2Buf = await r.arrayBuffer();
  status('Soundfont loaded.');
}

// ── Play a song ───────────────────────────────────────────────────────────────

async function playSong(idx) {
  const song = songs[idx];
  if (!song) return;

  // highlight
  document.querySelectorAll('#song-list li').forEach((li,i) => li.classList.toggle('active', i===idx));
  currentSongIdx = idx;

  $('player').style.display = 'block';
  $('now-playing').textContent = `Now: ${song.filename}${song.title ? ' — ' + song.title : ''}`;

  if (!ctx) {
    ctx = new AudioContext();
  }
  if (ctx.state === 'suspended') await ctx.resume();

  // stop previous
  if (player) { try { player.stop(); } catch(_) {} }
  if (synth)  { try { synth.stopAll(); } catch(_) {} }

  status('Fetching MIDI…');
  const mr = await fetch(song.url);
  const midiBuf = await mr.arrayBuffer();

  status('Synthesizing…');
  synth = new Synthetizer(ctx.destination, currentSF2Buf);
  const midiObj = new MIDI(midiBuf, '');
  player = new MidiPlayer(midiObj, ctx, synth);

  player.play();
  $('btn-play').textContent = '⏸ Pause';
  status('Playing.');
  updateSeekLoop();
}

// ── Seek / time display ───────────────────────────────────────────────────────

function updateSeekLoop() {
  const seek = $('seek');
  const timeDisplay = $('time-display');
  function tick() {
    if (!player) return;
    const dur = player.duration;
    const cur = player.currentTime;
    if (dur > 0 && !seeking) {
      seek.value = Math.round((cur / dur) * 1000);
    }
    timeDisplay.textContent = `${fmt(cur)} / ${fmt(dur)}`;
    if (!player.paused) requestAnimationFrame(tick);
    else if (cur >= dur - 0.1 && dur > 0) {
      // auto-advance
      const next = (currentSongIdx + 1) % songs.length;
      playSong(next);
    }
  }
  requestAnimationFrame(tick);
}

// ── Controls ──────────────────────────────────────────────────────────────────

$('btn-play').addEventListener('click', () => {
  if (!player) return;
  if (player.paused) {
    player.play();
    $('btn-play').textContent = '⏸ Pause';
    updateSeekLoop();
  } else {
    player.pause();
    $('btn-play').textContent = '▶ Play';
  }
});

$('btn-stop').addEventListener('click', () => {
  if (player) { player.stop(); $('btn-play').textContent = '▶ Play'; }
});

$('seek').addEventListener('mousedown', () => { seeking = true; });
$('seek').addEventListener('touchstart', () => { seeking = true; });
$('seek').addEventListener('input', () => {
  if (!player) return;
  const t = (parseInt($('seek').value) / 1000) * player.duration;
  $('time-display').textContent = `${fmt(t)} / ${fmt(player.duration)}`;
});
$('seek').addEventListener('change', () => {
  if (!player) return;
  const t = (parseInt($('seek').value) / 1000) * player.duration;
  player.currentTime = t;
  seeking = false;
  if (!player.paused) updateSeekLoop();
});

// ── SF2 switcher ──────────────────────────────────────────────────────────────

$('sf2-select').addEventListener('change', async () => {
  const url = $('sf2-select').value;
  await loadSF2(url);
  // reload current song with new SF2
  if (currentSongIdx >= 0) playSong(currentSongIdx);
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────

(async () => {
  const ok = await loadSpessa();
  if (!ok) return;

  const { midis, sf2s: sf2urls } = await discoverFiles();
  sf2s = sf2urls;

  if (sf2s.length === 0) {
    status('No .sf2 soundfont files found in this directory. Add one and reload.');
    return;
  }

  // SF2 picker: only show if multiple
  if (sf2s.length > 1) {
    const sel = $('sf2-select');
    sf2s.forEach(url => {
      const opt = document.createElement('option');
      opt.value = url;
      opt.textContent = url.split('/').pop();
      sel.appendChild(opt);
    });
    $('sf2-section').style.display = 'block';
  }

  // Load the first SF2
  await loadSF2(sf2s[0]);

  if (midis.length === 0) {
    status('No MIDI files found. Add .mid files and reload.');
    return;
  }

  // Fetch + parse metadata for each MIDI
  status(`Reading ${midis.length} MIDI file(s)…`);
  const list = $('song-list');

  await Promise.all(midis.map(async (url, idx) => {
    const filename = decodeURIComponent(url.split('/').pop());
    let title = null;
    try {
      const r = await fetch(url);
      const buf = await r.arrayBuffer();
      title = readMidiTitle(buf);
    } catch(_) {}
    songs[idx] = { url, filename, title };
  }));

  // sort alphabetically by filename
  songs.sort((a,b) => a.filename.localeCompare(b.filename));

  songs.forEach((song, idx) => {
    const li = document.createElement('li');
    const fn = document.createElement('span');
    fn.className = 'filename';
    fn.textContent = song.filename;
    li.appendChild(fn);
    if (song.title) {
      const mt = document.createElement('span');
      mt.className = 'meta-title';
      mt.textContent = song.title;
      li.appendChild(mt);
    }
    li.addEventListener('click', () => playSong(idx));
    list.appendChild(li);
  });

  status(`${songs.length} track(s) ready. Click a track to play.`);
})();
</script>
</body>
</html>
